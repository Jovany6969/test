<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pingpong - Profil hráča</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="back-link-container">
    <a href="index.html" class="back-link">← Späť na Tabuľku</a>
  </div>
  
  <h1 id="player-title" style="text-align: center; text-transform: uppercase;">Načítavam...</h1>
  
  <div class="stats-container">
    <div class="stat-box">Pozícia<br><span id="current-rank">-</span></div>
    <div class="stat-box">Zápasy<br><span id="matches-played">0</span></div>
    <div class="stat-box">Výhry<br><span id="wins">0</span></div>
    <div class="stat-box">Prehry<br><span id="losses">0</span></div>
    <div class="stat-box">Sety +<br><span id="sets-won">0</span></div>
    <div class="stat-box">Sety -<br><span id="sets-lost">0</span></div>
  </div>

  <h2>Rozpis zápasov</h2>
  <div class="profile-tables-grid" id="match-tables-container"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBvjsbk35S43nORNCHfg4AJfVAxp3rr_gg",
    authDomain: "ligapinec.firebaseapp.com",
    projectId: "ligapinec",
    storageBucket: "ligapinec.firebasestorage.app",
    messagingSenderId: "1005675095277",
    appId: "1:1005675095277:web:94ed61594ba1d088e1d8e4"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const urlParams = new URLSearchParams(window.location.search);
  const currentPlayer = urlParams.get('meno');
  const allPlayers = ["Alex", "Maxo", "Jašo", "Miňo", "Pali", "Kali", "Erik", "Pišta"];

  if (!currentPlayer || !allPlayers.includes(currentPlayer)) {
    window.location.href = "index.html";
  }

  document.getElementById("player-title").textContent = currentPlayer;

  const opponents = allPlayers.filter(p => p !== currentPlayer);

  db.collection("zapas").onSnapshot((snapshot) => {
    let matchData = {};
    snapshot.forEach((doc) => {
      matchData[doc.id] = doc.data();
    });
    drawProfile(matchData);
  });

  function drawProfile(matchData) {
    // 1. Výpočet celkového poradia pre aktuálnu pozíciu
    const stats = {};
    allPlayers.forEach(p => stats[p] = { wins: 0, losses: 0, setsWon: 0, setsLost: 0 });

    for (const key in matchData) {
      const match = matchData[key];
      stats[match.player1].setsWon += match.score1;
      stats[match.player1].setsLost += match.score2;
      stats[match.player2].setsWon += match.score2;
      stats[match.player2].setsLost += match.score1;

      if (match.score1 > match.score2) { stats[match.player1].wins++; stats[match.player2].losses++; }
      else if (match.score2 > match.score1) { stats[match.player2].wins++; stats[match.player1].losses++; }
    }

    const leaderboard = allPlayers.map(player => ({ player, ...stats[player] }));
    
    leaderboard.sort((a, b) => {
      if (b.setsWon !== a.setsWon) return b.setsWon - a.setsWon;

      let aWinsH2H = 0, bWinsH2H = 0, aSetsH2H = 0, bSetsH2H = 0;
      const sortedNames = [a.player, b.player].sort();
      for (let i = 1; i <= 4; i++) {
        const matchKey = `${sortedNames[0]}_${sortedNames[1]}_${i}`;
        const match = matchData[matchKey];
        if (match) {
          let scoreA = match.player1 === a.player ? match.score1 : match.score2;
          let scoreB = match.player1 === b.player ? match.score1 : match.score2;
          aSetsH2H += scoreA; bSetsH2H += scoreB;
          if (scoreA > scoreB) aWinsH2H++;
          if (scoreB > scoreA) bWinsH2H++;
        }
      }
      
      if (bWinsH2H !== aWinsH2H) return bWinsH2H - aWinsH2H;
      if (bSetsH2H !== aSetsH2H) return bSetsH2H - aSetsH2H;
      if (b.wins !== a.wins) return b.wins - a.wins;
      return a.player.localeCompare(b.player);
    });

    const myRankIndex = leaderboard.findIndex(p => p.player === currentPlayer);
    document.getElementById("current-rank").textContent = (myRankIndex + 1) + ".";

    // 2. Vykreslenie tabuliek pre súperov
    const container = document.getElementById("match-tables-container");
    container.innerHTML = ''; 

    let totalMatches = 0, totalWins = 0, totalLosses = 0, totalSetsWon = 0, totalSetsLost = 0;

    opponents.forEach(opponent => {
      const table = document.createElement("table");
      table.className = "profile-table";
      
      let html = `
        <thead>
          <tr>
            <th colspan="2" class="opp-name">${opponent}</th>
          </tr>
          <tr>
            <th class="sub-head">Dátum</th>
            <th class="sub-head">Skóre<br><small>(Ja : Súper)</small></th>
          </tr>
        </thead>
        <tbody>
      `;
      
      const sorted = [currentPlayer, opponent].sort();
      let matchesBetween = [];
      
      // Zozbieranie všetkých odohraných zápasov medzi týmito dvoma
      for (let i = 1; i <= 4; i++) {
        const key = `${sorted[0]}_${sorted[1]}_${i}`;
        if (matchData[key]) {
          matchesBetween.push(matchData[key]);
        }
      }

      // Zoradenie zápasov chronologicky (od najstaršieho po najnovší)
      matchesBetween.sort((a, b) => {
        let timeA = a.timestamp ? a.timestamp.toMillis() : 0;
        let timeB = b.timestamp ? b.timestamp.toMillis() : 0;
        let dateA = a.date ? new Date(a.date).getTime() : timeA;
        let dateB = b.date ? new Date(b.date).getTime() : timeB;
        
        if (dateA === dateB) return timeA - timeB; 
        return dateA - dateB;
      });

      // Vykreslenie presne 4 riadkov
      for (let i = 0; i < 4; i++) {
        const match = matchesBetween[i];
        
        if (match) {
          let myScore = match.player1 === currentPlayer ? match.score1 : match.score2;
          let oppScore = match.player1 === currentPlayer ? match.score2 : match.score1;
          
          let displayDate = match.date;
          if(match.date) {
            const parts = match.date.split('-');
            if(parts.length === 3) {
               displayDate = `${parts[2]}. ${parts[1]}. ${parts[0]}`;
            }
          }

          let color = myScore > oppScore ? "var(--success)" : "var(--danger)";

          html += `
            <tr>
              <td><span class="score-box">${displayDate}</span></td>
              <td><span class="score-box" style="font-weight: bold; color: ${color};">${myScore} : ${oppScore}</span></td>
            </tr>
          `;

          totalMatches++;
          totalSetsWon += myScore;
          totalSetsLost += oppScore;
          if (myScore > oppScore) totalWins++;
          else totalLosses++;

        } else {
          html += `
            <tr>
              <td><span class="score-box empty-slot">dd. mm. rrrr</span></td>
              <td><span class="score-box empty-slot">napr. 3:1</span></td>
            </tr>
          `;
        }
      }

      html += `</tbody>`;
      table.innerHTML = html;
      container.appendChild(table);
    });

    document.getElementById("matches-played").textContent = totalMatches;
    document.getElementById("wins").textContent = totalWins;
    document.getElementById("losses").textContent = totalLosses;
    document.getElementById("sets-won").textContent = totalSetsWon;
    document.getElementById("sets-lost").textContent = totalSetsLost;
  }
</script>
</body>
</html>
