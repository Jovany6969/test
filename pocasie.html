<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pingpong - Počasie a Vietor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="back-link-container">
    <a href="index.html" class="back-link">← Späť na Tabuľku</a>
  </div>
  
  <h1 style="text-align: center; margin-bottom: 30px;">Aktuálne Počasie</h1>

  <div class="weather-box sunset-box">
    <h2 style="margin-top: 0; font-size: 1.5em;">🌅 Západ slnka (Bratislava)</h2>
    <p id="sunset-time" style="font-size: 2.5em; font-weight: bold; margin: 10px 0;">Načítavam...</p>
  </div>

  <div class="weather-box">
    <h2 class="weather-title">Týždenná a hodinová predpoveď</h2>
    <div class="weather-scroll">
      <iframe src="https://www.meteoblue.com/sk/po%c4%8dasie/widget/three/bratislava_slovensko_3060972?geoloc=fixed&nocurrent=0&noforecast=0&days=7&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=image"  frameborder="0" scrolling="NO" allowtransparency="true" sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox" style="width: 100%; height: 750px; margin-top: 15px;"></iframe>
    </div>
  </div>

  <div class="weather-box">
    <h2 class="weather-title">Živý radar na vietor</h2>
    <iframe width="100%" height="500" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=%C2%B0C&metricWind=km%2Fh&zoom=10&overlay=wind&product=ecmwf&level=surface&lat=48.148&lon=17.107&detailLat=48.148&detailLon=17.107&detail=true&marker=true" frameborder="0" style="margin-top: 15px;"></iframe>
  </div>

  <script>
    fetch('https://api.open-meteo.com/v1/forecast?latitude=48.1484&longitude=17.1077&daily=sunset&timezone=Europe%2FBratislava')
      .then(response => response.json())
      .then(data => {
        const sunsetISO = data.daily.sunset[0]; 
        const timeString = sunsetISO.split('T')[1]; 
        document.getElementById('sunset-time').innerText = `Dnes o ${timeString}`;
      })
      .catch(err => {
        document.getElementById('sunset-time').innerText = "Nedostupné";
        console.error("Chyba pri načítavaní počasia: ", err);
      });
  </script>

</body>
</html>
